name: twitch-overlay

on:
  push:
    paths:
      - "twitch/web/overlay/**"
  pull_request:
    paths:
      - "twitch/web/overlay/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: twitch/web/overlay

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm run check

      - name: Build
        run: pnpm run build

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: twitch/web/overlay

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: twitch/web/overlay

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm run test
