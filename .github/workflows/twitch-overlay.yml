name: twitch-overlay

on:
  push:
    paths:
      - "twitch-overlay/**"
  pull_request:
    paths:
      - "twitch-overlay/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: twitch-overlay

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: twitch-overlay/package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run check

      - name: Build
        run: bun run build

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: twitch-overlay

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: twitch-overlay/package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint
