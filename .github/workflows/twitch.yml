name: twitch

on:
  push:
    paths:
      - "twitch/**"
  pull_request:
    paths:
      - "twitch/**"

jobs:
  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: twitch

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: twitch/go.mod

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  go-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: twitch/go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: twitch

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: twitch/web

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm run check

      - name: Build
        run: pnpm run build

  web-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: twitch/web

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

  web-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: twitch/web

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm run test
