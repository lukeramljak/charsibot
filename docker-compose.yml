services:
  charsibot:
    build:
      dockerfile: Dockerfile
    container_name: charsibot
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - twitch-data:/data
    environment:
      - SERVER_PORT=8081
      - DB_PATH=/data/charsibot.db
    labels:
      - docker-volume-backup.stop-during-backup=true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  backup:
    image: offen/docker-volume-backup:latest
    restart: always
    container_name: charsibot-backup
    environment:
      - BACKUP_FILENAME=charsibot-db-backup-%Y-%m-%dT%H-%M-%S.tar.gz
      - BACKUP_CRON_EXPRESSION=0 18 * * *
      - BACKUP_RETENTION_DAYS=7
      - AWS_S3_PATH=${BACKUP_AWS_S3_PATH}
      - AWS_S3_BUCKET_NAME=${BACKUP_AWS_S3_BUCKET_NAME}
      - AWS_ENDPOINT=${BACKUP_AWS_ENDPOINT}
      - AWS_ACCESS_KEY_ID=${BACKUP_AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${BACKUP_AWS_SECRET_ACCESS_KEY}
    volumes:
      - twitch-data:/backup/twitch-data:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  twitch-data:
