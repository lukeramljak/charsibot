services:
  twitch:
    build:
      context: ./twitch
      dockerfile: Dockerfile
    container_name: twitch
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - twitch-data:/data
    env_file:
      - path: ./twitch/.env
        required: false
    environment:
      - LOG_LEVEL
      - SERVER_PORT=8081
      - DB_PATH=/data/charsibot.db
      - TWITCH_CLIENT_ID
      - TWITCH_CLIENT_SECRET
      - TWITCH_BOT_USER_ID
      - TWITCH_CHANNEL_USER_ID
      - TWITCH_OAUTH_REDIRECT_URI
    labels:
      - docker-volume-backup.stop-during-backup=true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  overlay:
    build:
      context: ./twitch/web/overlay
      dockerfile: Dockerfile
    container_name: twitch-overlay
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - path: ./twitch/web/overlay/.env
        required: false
    environment:
      - PUBLIC_SERVER_BASE_URL
    depends_on:
      twitch:
        condition: service_healthy

  discord:
    build:
      context: ./discord
      dockerfile: Dockerfile
    container_name: discord
    restart: unless-stopped
    env_file:
      - path: ./discord/.env
        required: false
    environment:
      - DISCORD_CLIENT_ID
      - DISCORD_GUILD_ID
      - DISCORD_TOKEN

  backup:
    image: offen/docker-volume-backup:latest
    restart: always
    container_name: twitch-backup
    environment:
      - BACKUP_FILENAME=charsibot-db-backup-%Y-%m-%dT%H-%M-%S.tar.gz
      - BACKUP_CRON_EXPRESSION=0 18 * * *
      - BACKUP_RETENTION_DAYS=7
      - AWS_S3_PATH=${BACKUP_AWS_S3_PATH}
      - AWS_S3_BUCKET_NAME=${BACKUP_AWS_S3_BUCKET_NAME}
      - AWS_ENDPOINT=${BACKUP_AWS_ENDPOINT}
      - AWS_ACCESS_KEY_ID=${BACKUP_AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${BACKUP_AWS_SECRET_ACCESS_KEY}
    volumes:
      - twitch-data:/backup/twitch-data:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  twitch-data:
